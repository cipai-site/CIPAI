<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CID-AI — Painel Cognitivo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg-primary:#0a0e1a;--bg-secondary:#111827;--bg-tertiary:#1f2937;
--bg-elevated:#374151;--text-primary:#f9fafb;--text-secondary:#d1d5db;
--text-muted:#9ca3af;--accent:#3b82f6;--accent-glow:rgba(59,130,246,.3);
--border:#374155;--success:#10b981;--warning:#f59e0b;
--danger:#ef4444;--info:#8b5cf6;
--confidence-high:#10b981;--confidence-medium:#f59e0b;--confidence-low:#ef4444;
}

body{
font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
background:var(--bg-primary);color:var(--text-primary);
line-height:1.6;overflow-x:hidden
}

.container{display:flex}

.sidebar{
width:280px;background:var(--bg-secondary);border-right:1px solid var(--border);
display:flex;flex-direction:column;position:fixed;height:100vh;left:0;top:0
}

.logo{padding:28px 24px;border-bottom:1px solid var(--border)}
.logo h1{
font-size:26px;font-weight:700;letter-spacing:-.03em;
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
-webkit-background-clip:text;-webkit-text-fill-color:transparent
}
.logo .tagline{
font-size:11px;color:var(--text-muted);margin-top:6px;
text-transform:uppercase;letter-spacing:.08em;font-weight:500
}

.nav{flex:1;padding:24px 0;overflow-y:auto}
.nav-section{margin-bottom:28px}
.nav-section-title{
font-size:11px;font-weight:600;color:var(--text-muted);
padding:0 24px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em
}

.nav-item{
padding:12px 24px;color:var(--text-secondary);text-decoration:none;
display:flex;align-items:center;gap:14px;font-size:14px;font-weight:500;
transition:.2s;position:relative
}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.nav-item.active{background:var(--bg-tertiary);color:var(--accent)}
.nav-item.active::before{
content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)
}
.nav-icon{font-size:18px;width:20px;text-align:center}

.main{flex:1;margin-left:280px}

.header{
background:var(--bg-secondary);border-bottom:1px solid var(--border);
padding:20px 36px;display:flex;align-items:center;justify-content:space-between
}
.header-title{font-size:20px;font-weight:600}
.header-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
.header-actions{display:flex;gap:12px}

.btn{
padding:10px 18px;border-radius:8px;border:none;cursor:pointer;
font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:8px
}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{
background:var(--bg-tertiary);color:var(--text-primary);
border:1px solid var(--border)
}

.content{padding:36px}

/* ===== CARDS ===== */
.cognitive-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:24px;margin-bottom:36px
}
.cognitive-card{
background:var(--bg-secondary);
border:1px solid var(--border);
border-radius:12px;padding:28px;
transition:.3s;position:relative
}
.cognitive-card:hover{border-color:var(--accent);transform:translateY(-2px)}

.cognitive-label{
font-size:12px;color:var(--text-muted);
text-transform:uppercase;letter-spacing:.08em;font-weight:600
}
.cognitive-value{font-size:36px;font-weight:700}

.confidence-bar{
width:100%;height:8px;background:var(--bg-tertiary);
border-radius:4px;overflow:hidden;margin:12px 0
}
.confidence-fill{
height:100%;
background:linear-gradient(90deg,var(--confidence-low),var(--confidence-medium),var(--confidence-high))
}
</style>
</head>

<body>
<div class="container">

<aside class="sidebar">
<div class="logo">
<h1>CID-AI</h1>
<div class="tagline">Inteligência Cognitiva</div>
</div>

<nav class="nav">
<div class="nav-section">
<div class="nav-section-title">Core</div>
<a href="01-cognitive-dashboard.html" class="nav-item active">
<span class="nav-icon">🧠</span>Painel Cognitivo
</a>
<a href="02-new-decision.html" class="nav-item">
<span class="nav-icon">➕</span>Nova Decisão
</a>
<a href="03-decision-history.html" class="nav-item">
<span class="nav-icon">📊</span>Histórico de Decisões
</a>
</div>

<div class="nav-section">
<div class="nav-section-title">Análise</div>
<a href="05-cfo-module.html" class="nav-item">
<span class="nav-icon">💰</span>Módulo CFO
</a>
<a href="09-pattern-analysis.html" class="nav-item">
<span class="nav-icon">📈</span>Análise de Padrões
</a>
</div>
</nav>
</aside>

<main class="main">
<header class="header">
<div>
<div class="header-title">Painel Cognitivo</div>
<div class="header-subtitle">
Centro de controle da inteligência decisória do CID-AI
</div>
</div>
<div class="header-actions">
<button class="btn btn-secondary" onclick="location.href='03-decision-history.html'">📊 Histórico</button>
<button class="btn btn-primary" onclick="location.href='02-new-decision.html'">➕ Nova Análise</button>
</div>
</header>

<div class="content">
<div class="cognitive-grid">
<div class="cognitive-card">
<div class="cognitive-label">Confiança da IA</div>
<div class="cognitive-value">78%</div>
<div class="confidence-bar"><div class="confidence-fill" style="width:78%"></div></div>
</div>

<div class="cognitive-card">
<div class="cognitive-label">Decisões Ativas</div>
<div class="cognitive-value">4</div>
</div>

<div class="cognitive-card">
<div class="cognitive-label">Assunções Validadas</div>
<div class="cognitive-value">23</div>
</div>
</div>
</div>
</main>

</div>
</body>
</html>
